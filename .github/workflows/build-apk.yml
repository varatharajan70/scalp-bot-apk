name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk openjdk-17-jdk-headless
        sudo apt-get install -y libssl-dev libffi-dev python3-dev build-essential
        sudo apt-get install -y autoconf automake libtool libtool-bin pkg-config m4 gettext

    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Build APK with Buildozer
      shell: bash
      run: |
        echo "Starting buildozer build..."
        yes | buildozer android debug 2>&1 | tee build.log
        STATUS=${PIPESTATUS[1]}
        echo "Buildozer exit code: $STATUS"
        exit $STATUS
      timeout-minutes: 90
      env:
        ANDROID_SDK_ROOT: ${{ runner.home }}/.buildozer/android/platform/android-sdk
        ANDROID_ACCEPT_LICENSE: "yes"

    - name: Show error tail if build failed
      if: failure()
      run: |
        echo "=== Last 150 lines of build.log ==="
        tail -n 150 build.log

    - name: Check if APK exists
      if: always()
      run: |
        echo "=== Checking for APK files ==="
        ls -lah bin/ 2>/dev/null || echo "No bin directory"
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found anywhere"

    - name: Upload APK (if exists)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: scalpbot-apk
        path: bin/
        retention-days: 30

    - name: Upload Build Log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
        retention-days: 7
