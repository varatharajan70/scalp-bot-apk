name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk openjdk-17-jdk-headless
        sudo apt-get install -y libssl-dev libffi-dev python3-dev build-essential

    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Accept Android SDK Licenses
      run: |
        mkdir -p ~/.android/licenses
        echo "24333f8a63b6825ea9c5514f83c2829b004d48a4" > ~/.android/licenses/android-sdk-license
        echo "d56f5187479451eabf01fb78af6dfcb131b33910" > ~/.android/licenses/android-sdk-preview-license
        echo "33b6a2b64607f11fa6461cdc600ee453ef0c5d47" > ~/.android/licenses/android-googletv-license

    - name: Build APK with Buildozer
      run: |
        buildozer android debug 2>&1 | tee build.log
      timeout-minutes: 90
      env:
        ANDROID_SDK_ROOT: ${{ runner.home }}/.buildozer/android/platform/android-sdk
        ANDROID_ACCEPT_LICENSE: "yes"

    - name: Check if APK exists
      run: |
        ls -lah bin/ 2>/dev/null || echo "No bin directory yet"
        find . -name "*.apk" 2>/dev/null || echo "No APK found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: scalpbot-apk
        path: bin/*.apk
        retention-days: 30

    - name: Upload Build Log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
        retention-days: 7
