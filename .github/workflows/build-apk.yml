name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk openjdk-17-jdk-headless
        sudo apt-get install -y libssl-dev libffi-dev python3-dev build-essential

    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Accept Android SDK Licenses
      run: |
        mkdir -p ~/.android
        echo "count=0" > ~/.android/repositories.cfg

        # Accept all licenses
        yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk --licenses 2>/dev/null || true

    - name: Build APK with Buildozer
      run: |
        buildozer android debug 2>&1 | tee build.log
      timeout-minutes: 90
      env:
        ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk

    - name: Check if APK exists
      run: |
        ls -lah bin/ 2>/dev/null || echo "No bin directory yet"
        find . -name "*.apk" 2>/dev/null || echo "No APK found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: scalpbot-apk
        path: bin/*.apk
        retention-days: 30

    - name: Upload Build Log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
        retention-days: 7
