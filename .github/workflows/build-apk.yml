name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      options: --user root

    steps:
    - uses: actions/checkout@v4

    - name: Build APK
      run: yes | buildozer android debug 2>&1 | tee build.log || true

    - name: Check if APK exists and fail if not
      run: |
        echo "=== Checking for APK files ==="
        ls -lah bin/ 2>/dev/null || echo "No bin directory"
        if find bin/ -name "*.apk" -type f 2>/dev/null | grep -q .; then
          echo "✅ APK built successfully"
          exit 0
        else
          echo "❌ APK build failed - no APK found in bin/"
          echo "=== Last 150 lines of build log ==="
          tail -n 150 build.log
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: scalpbot-apk
        path: bin/
        retention-days: 30
