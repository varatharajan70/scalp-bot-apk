name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      options: --user root

    steps:
    - uses: actions/checkout@v4

    - name: Build APK
      run: |
        yes | buildozer android debug 2>&1 | tee build.log
        STATUS=${PIPESTATUS[1]}
        echo "Buildozer exit code: $STATUS"
        exit $STATUS
      shell: bash

    - name: Show error tail if build failed
      if: failure()
      run: tail -n 150 build.log

    - name: Check if APK exists
      if: always()
      run: |
        echo "=== Checking for APK files ==="
        ls -lah bin/ 2>/dev/null || echo "No bin directory"
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found anywhere"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: scalpbot-apk
        path: bin/
        retention-days: 30
